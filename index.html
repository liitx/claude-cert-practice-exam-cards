              </div>`;
            }).join('')}
          </div>
          <button type="button" class="add-choice" onclick="addChoice()">+ add choice</button>
        </div>`:''}

        ${modal.cardType==='tf'?`
        <div class="field">
          <label>Correct answer</label>
          <div class="tf-pick-edit">
            <button type="button" class="${modal.correctTF===true?'on':''}" onclick="setCorrectTF(true)">True</button>
            <button type="button" class="${modal.correctTF===false?'on':''}" onclick="setCorrectTF(false)">False</button>
          </div>
        </div>`:''}

        ${modal.cardType==='fib'?`
        <div class="field">
          <label>Accepted answers &middot; one per line, case-insensitive</label>
          <textarea placeholder="primary answer&#10;alternative spelling&#10;synonym" oninput="mset('accepted',this.value)">${esc(modal.accepted||'')}</textarea>
        </div>`:''}

        ${modal.cardType&&modal.cardType!=='basic'?`
        <div class="field">
          <label>Explanation (optional)</label>
          <textarea placeholder="Plain-text summary shown on the back..." oninput="mset('a',this.value)">${esc(modal.a)}</textarea>
        </div>`:''}

        <div class="field">
          <label>Why (optional)</label>
          <textarea placeholder="The reasoning behind it..." oninput="mset('why',this.value)">${esc(modal.why)}</textarea>
        </div>

        <label class="checkrow">
          <input type="checkbox" ${modal.missed?'checked':''} onchange="msetR('missed',this.checked)">
          <span>I missed this one</span>
        </label>

        ${modal.missed?`
        <div class="field">
          <label>What I picked (optional)</label>
          <input type="text" placeholder="e.g. A" maxlength="40" value="${esc(modal.pick)}" oninput="mset('pick',this.value)">
        </div>`:''}

        <div class="actions">
          <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
          <button class="btn btn-save" onclick="saveCard()" ${valid?'':'disabled'}>${editingCard?'Save changes':'Add card'}</button>
        </div>
      </div>
    </div>`;
  }
  if(modal.type==='ai-prompt'){
    const d=currentDeck();
    const types=[['mc','Multiple choice'],['ms','Select all'],['tf','True / False'],['fib','Fill blank'],['basic','Basic']];
    return `<div class="backdrop" onclick="if(event.target===this)closeModal()">
      <div class="sheet" role="dialog" aria-modal="true">
        <h2>Ask Claude to generate a deck</h2>
        <div class="sub">Pick a topic and a card type. Copy the prompt. Paste into Claude. Paste Claude's JSON into the <b>import</b> sheet.</div>

        <div class="field">
          <label>Topic</label>
          <input type="text" placeholder="e.g. Kubernetes networking, blood gases, ancient Greek myth" value="${esc(modal.topic||'')}" oninput="mset('topic',this.value)" autofocus>
        </div>

        <div class="field-row">
          <div class="field">
            <label>How many cards</label>
            <input type="number" min="1" max="50" value="${esc(String(modal.count||10))}" oninput="mset('count',this.value)">
          </div>
          <div class="field">
            <label>Default card type</label>
            <div class="type-tabs" style="margin-top:6px">
              ${types.map(([v,l])=>`<button type="button" class="type-tab ${modal.cardType===v?'on':''}" onclick="msetR('cardType','${v}')">${esc(l)}</button>`).join('')}
            </div>
          </div>
        </div>

        <div class="field">
          <label>Add to</label>
          <div class="type-tabs" style="margin-top:6px">
            <button type="button" class="type-tab ${modal.target==='new'?'on':''}" onclick="msetR('target','new')">New deck</button>
            <button type="button" class="type-tab ${modal.target==='current'?'on':''}" onclick="msetR('target','current')">Current deck (${esc(d.name)})</button>
          </div>
        </div>

        <div class="field">
          <label>Prompt for Claude &middot; click to select all</label>
          <textarea id="claude-prompt-preview" readonly style="min-height:200px;font-family:var(--mono);font-size:11.5px;line-height:1.55" onclick="this.select()">${esc(buildClaudePrompt(modal))}</textarea>
          <div id="claude-copy-note" style="margin-top:8px;font-family:var(--mono);font-size:12px;color:var(--got);min-height:18px"></div>
        </div>

        <div class="actions">
          <button class="btn btn-cancel" onclick="closeModal()">Close</button>
          <button class="btn btn-save" onclick="copyClaudePrompt()">Copy prompt</button>
        </div>
      </div>
    </div>`;
  }
  if(modal.type==='manage-subjects'){
    const deckId=state.currentDeckId;
    const d=currentDeck();
    const scenarios=deckScenarios(deckId);
    const scenarioKeys=Object.keys(scenarios);
    const cardsByScn=deckCards(deckId).reduce((m,c)=>{m[c.scn]=(m[c.scn]||0)+1;return m;},{});
    const editingKey=modal.editingSubjectKey;
    const addingSubject=!!modal.newSubject;

    const rows=scenarioKeys.map(k=>{
      const v=scenarios[k];
      const count=cardsByScn[k]||0;
      const isLast=scenarioKeys.length<=1;
      const canDelete=count===0&&!isLast;
      const delTitle=isLast?'keep at least one subject':count>0?(count+' card'+(count>1?'s':'')+' use this'):'delete';
      return `<div class="subject-row">
        <button type="button" class="sub-chip colored" style="background:${v.color}" onclick="openSubjectEditor('${esc(k)}')">${esc(v.label)}</button>
        <span class="subject-count">${count} card${count===1?'':'s'}</span>
        <button type="button" class="sub-x" ${canDelete?'':'disabled'} onclick="${canDelete?`removeSubject('${esc(k)}')`:''}" title="${esc(delTitle)}">&times;</button>
      </div>`;
    }).join('');

    return `<div class="backdrop" onclick="if(event.target===this)closeModal()">
      <div class="sheet" role="dialog" aria-modal="true">
        <h2>Subjects</h2>
        <div class="sub">Rename or delete labels for <b>${esc(d.name)}</b>. Tap a chip to rename. Delete is blocked while cards still reference a subject.</div>

        <div class="subject-list">${rows}</div>

        ${!addingSubject&&!editingKey?`
        <button class="add-btn" onclick="toggleAddSubject()" style="margin-top:16px;width:100%;justify-content:center"><span class="plus">+</span> New subject</button>`:''}

        ${addingSubject?`
        <div class="subject-editor" style="margin-top:14px">
          <div class="field">
            <label>New subject name</label>
            <input type="text" placeholder="e.g. Tool Use" value="${esc(modal.newSubject.label)}" oninput="mnest('newSubject','label',this.value)" autofocus>
          </div>
          <div class="field">
            <label>Color</label>
            ${swatchRow(modal.newSubject.color,'pickNewSubjectColor')}
          </div>
          <div class="editor-actions">
            <button class="btn btn-cancel" onclick="toggleAddSubject()">Cancel</button>
            <button class="btn btn-save sub-new-save" onclick="saveNewSubject()" ${modal.newSubject.label.trim()?'':'disabled'}>Add</button>
          </div>
        </div>`:''}

        ${editingKey?`
        <div class="subject-editor" style="margin-top:14px">
          <div class="field">
            <label>Rename subject</label>
            <input type="text" value="${esc(modal.editLabel)}" oninput="mset('editLabel',this.value)" autofocus>
          </div>
          <div class="field">
            <label>Color</label>
            ${swatchRow(modal.editColor,'pickEditColor')}
          </div>
          <div class="editor-actions">
            <button class="btn btn-cancel" onclick="closeSubjectEditor()">Cancel</button>
            <button class="btn btn-save sub-edit-save" onclick="saveSubjectEdit()" ${modal.editLabel&&modal.editLabel.trim()?'':'disabled'}>Save</button>
          </div>
        </div>`:''}

        <div class="actions">
          <button class="btn btn-cancel" onclick="closeModal()" style="grid-column:1 / -1">Done</button>
        </div>
      </div>
    </div>`;
  }
  if(modal.type==='export'){
    const deckId=state.currentDeckId;
    const d=currentDeck();
    const userDeck=state.userDecks.find(x=>x.id===deckId);
    const overlayCards=((state.overlay.cards||{})[deckId]||[]).length;
    const overlayScn=Object.keys((state.overlay.scenarios||{})[deckId]||{}).length;
    const progCount=Object.keys(state.progress[deckId]||{}).length;
    const totalUserDecks=state.userDecks.length;
    const totalOverlayDecks=Object.keys(state.overlay.cards||{}).filter(k=>(state.overlay.cards[k]||[]).length).length;
    let thisSummary;
    if(userDeck){
      thisSummary=`Private deck <b>${esc(d.name)}</b> with ${userDeck.cards.length} card${userDeck.cards.length===1?'':'s'}, plus your progress (${progCount} marked).`;
    }else if(overlayCards||overlayScn){
      thisSummary=`Your additions to <b>${esc(d.name)}</b> (${overlayCards} card${overlayCards===1?'':'s'}, ${overlayScn} subject${overlayScn===1?'':'s'}) and progress.`;
    }else{
      thisSummary=`Just your progress on <b>${esc(d.name)}</b> (${progCount} marked).`;
    }
    const hasAll=totalUserDecks>0||totalOverlayDecks>0||Object.keys(state.progress).length>0;
    return `<div class="backdrop" onclick="if(event.target===this)closeModal()">
      <div class="sheet" role="dialog" aria-modal="true">
        <h2>Export</h2>
        <div class="sub">Move your decks and progress to another device. The JSON is private to you — sharing it is your call.</div>

        <div class="field">
          <label>This deck</label>
          <div style="font-size:13.5px;line-height:1.55;color:var(--muted)">${thisSummary}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
            <button class="add-btn" onclick="copyExport('this')">Copy JSON</button>
            <button class="add-btn" onclick="downloadExport('this')">Download .json</button>
          </div>
        </div>

        ${hasAll?`
        <div class="field">
          <label>Everything you've made</label>
          <div style="font-size:13.5px;line-height:1.55;color:var(--muted)">All ${totalUserDecks} private deck${totalUserDecks===1?'':'s'}, additions across ${totalOverlayDecks} shared deck${totalOverlayDecks===1?'':'s'}, and all progress.</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
            <button class="add-btn" onclick="copyExport('all')">Copy JSON</button>
            <button class="add-btn" onclick="downloadExport('all')">Download .json</button>
          </div>
        </div>`:''}

        <div id="export-note" style="margin-top:14px;font-family:var(--mono);font-size:12px;color:var(--got);min-height:18px"></div>

        <div class="actions">
          <button class="btn btn-cancel" onclick="closeModal()" style="grid-column:1 / -1">Close</button>
        </div>
      </div>
    </div>`;
  }
  if(modal.type==='import'){
    return `<div class="backdrop" onclick="if(event.target===this)closeModal()">
      <div class="sheet" role="dialog" aria-modal="true">
        <h2>Import</h2>
        <div class="sub">Paste JSON exported from another device, or generated by Claude. Existing decks aren't overwritten. Imports land alongside what's already here. <button class="inline-link" style="display:block;margin-top:6px" onclick="closeModal();openPromptModal()">Don't have JSON yet? Get a prompt for Claude.</button></div>

        <div class="field">
          <label>Exported JSON</label>
          <textarea placeholder='{"version":1,"kind":"deck",...}' oninput="mset('text',this.value)" style="min-height:160px;font-family:var(--mono);font-size:12px;line-height:1.5">${esc(modal.text||'')}</textarea>
          ${modal.error?`<div style="margin-top:10px;color:var(--cs);font-size:12.5px;font-family:var(--mono);line-height:1.55;white-space:pre-wrap;background:rgba(217,122,138,.08);border:1px solid rgba(217,122,138,.25);border-radius:9px;padding:10px 12px">${esc(modal.error)}</div>`:''}
        </div>

        <div class="actions">
          <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
          <button class="btn btn-save" onclick="doImport()" ${(modal.text||'').trim()?'':'disabled'}>Import</button>
        </div>
      </div>
    </div>`;
  }
  if(modal.type==='deck'){
    const valid=modal.name.trim()&&modal.firstLabel.trim();
    return `<div class="backdrop" onclick="if(event.target===this)closeModal()">
      <div class="sheet" role="dialog" aria-modal="true">
        <h2>New deck</h2>
        <div class="sub">A study deck with its own subjects and cards.</div>

        <div class="field">
          <label>Deck name</label>
          <input type="text" placeholder="e.g. AWS Practice Exam" value="${esc(modal.name)}" oninput="mset('name',this.value)" autofocus>
        </div>

        <div class="field">
          <label>First subject</label>
          <input type="text" placeholder="e.g. Networking" value="${esc(modal.firstLabel)}" oninput="mset('firstLabel',this.value)">
          <label style="margin-top:12px">Subject color</label>
          ${swatchRow(modal.firstColor,'pickFirstColor')}
        </div>

        <div class="actions">
          <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
          <button class="btn btn-save" onclick="saveDeck()" ${valid?'':'disabled'}>Create deck</button>
        </div>
      </div>
    </div>`;
  }
  return '';
}

function pickNewSubjectColor(c){modal.newSubject.color=c;render();}
function pickFirstColor(c){modal.firstColor=c;render();}

function render(){
  const d=currentDeck();
  const scenarios=deckScenarios(state.currentDeckId);
  const dk=viewDeck();const c=counts();
  const root=document.getElementById('root');
  const totalCards=deckCards(state.currentDeckId).length;
  const st=deckProgress();
  const reviewed=Object.keys(st).length;
  const pct=totalCards?Math.round((c.got/totalCards)*100):0;

  const decks=[...BUILTIN_DECKS,...state.userDecks].filter(x=>!state.hiddenDecks.includes(x.id));
  const deckOpts=decks.map(x=>`<option value="${esc(x.id)}" ${state.currentDeckId===x.id?'selected':''}>${esc(x.name)}</option>`).join('');

  const chips=[
    ['miss','My misses',c.miss],
    ['all','All',c.all],
    ['review','Review',c.review],
    ['got','Got it',c.got]
  ].map(([k,lbl,n])=>`<button class="chip ${filter===k?'on':''}" onclick="setFilter('${k}')">${lbl}<span class="n">${n}</span></button>`).join('');

  let body;
  if(!dk.length){
    const msg=filter==='review'?'Nothing in your review pile.<br>Mark cards <b>Review</b> as you study to build one.'
      :filter==='got'?'No cards marked <b>Got it</b> yet.'
      :filter==='miss'?'No cards flagged as missed.'
      :'This deck has no cards yet.';
    body=`<div class="empty">${msg}
      <div class="empty-cta"><button class="add-btn primary" onclick="openCardModal()"><span class="plus">+</span> New card</button></div>
    </div>`;
  }else{
    const card=dk[idx];const stCard=st[card.id];
    body=`
    <div class="stage">
      <div class="card ${flipped?'flipped':''}" onclick="flip()">
        <div class="face front">${renderCardFront(card,scenarios)}</div>
        <div class="face back">${renderCardBack(card,scenarios)}</div>
      </div>
    </div>
    <div class="controls">
      <button class="btn nav" onclick="go(-1)" aria-label="Previous">←</button>
      <button class="btn review ${stCard==='review'?'on-review':''}" onclick="mark('review')">⟲ Review</button>
      <button class="btn got ${stCard==='got'?'on-got':''}" onclick="mark('got')">✓ Got it</button>
      <button class="btn nav" onclick="go(1)" aria-label="Next">→</button>
    </div>
    <div class="keys">space flip · ← → move · 1 review · 2 got it</div>`;
  }

  const newCount=pendingSync?(pendingSync.newDecks+pendingSync.newCards):0;
  const libTitle=pendingSync
    ?`${pendingSync.newDecks?pendingSync.newDecks+' new deck'+(pendingSync.newDecks>1?'s':''):''}${pendingSync.newDecks&&pendingSync.newCards?', ':''}${pendingSync.newCards?pendingSync.newCards+' new card'+(pendingSync.newCards>1?'s':''):''} — tap to sync`
    :'Library up to date — tap to check';

  root.innerHTML=`
    <div class="rail"><div class="rail-fill" style="width:${pct}%"></div></div>
    <header>
      <h1>${esc(d.name)} <span>· ${reviewed}/${totalCards} touched · ${pct}% mastered</span></h1>
      <span class="header-right">
        <button class="lib-btn ${pendingSync?'has-new':''}" onclick="syncNow()" title="${esc(libTitle)}" aria-label="${esc(libTitle)}">
          <span class="arrow">&#x21bb;</span>
          <span>library</span>
          ${newCount?`<span class="dot">${newCount>9?'9+':newCount}</span>`:'<span class="dot"></span>'}
        </button>
        <span class="counter">${dk.length?`${idx+1} / ${dk.length}`:'0 / 0'}</span>
      </span>
    </header>
    <div class="deck-row">
      <select class="deck-select" onchange="switchDeck(this.value)" aria-label="Select deck">${deckOpts}</select>
      <button class="add-btn primary" onclick="openCardModal()" aria-label="New card"><span class="plus">+</span> Card</button>
      <button class="add-btn" onclick="openDeckModal()" aria-label="New deck"><span class="plus">+</span> Deck</button>
    </div>
    <div class="filters">${chips}</div>
    ${body}
    <div class="deck-meta">
      <button class="reset" onclick="resetAll()">reset progress</button>
      · <button class="reset" onclick="openManageSubjectsModal()">subjects</button>
      ${deckHasUserContent(state.currentDeckId)?` · <button class="reset share" onclick="shareDeck()">share to library</button>`:''}
      · <button class="reset" onclick="openExportModal()">export</button>
      · <button class="reset" onclick="openImportModal()">import</button>
      · <button class="reset" onclick="openPromptModal()">ask claude</button>
      ${d.builtin
        ?` · <button onclick="hideDeck()">hide from my view</button>`
        :` · <button onclick="deleteDeck()">delete this deck</button>`}
      ${state.hiddenDecks.length?` · <button class="reset" onclick="unhideAll()">unhide ${state.hiddenDecks.length}</button>`:''}
    </div>
    ${modalHTML()}`;
}

document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible')checkLibrary();
});
window.addEventListener('focus',()=>checkLibrary());

document.addEventListener('keydown',e=>{
  if(modal){
    if(e.key==='Escape')closeModal();
    return;
  }
  if(e.target&&(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT'))return;
  if(e.key===' '){e.preventDefault();flip();}
  else if(e.key==='ArrowRight')go(1);
  else if(e.key==='ArrowLeft')go(-1);
  else if(e.key==='1')mark('review');
  else if(e.key==='2')mark('got');
});

load();
</script>
</body>
</html>
