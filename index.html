<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Drill Deck</title>
</head>
<body>
<div id="root"></div>

<style>
  :root{
    --ink:#13151a; --surface:#1b1e26; --surface-2:#222632;
    --text:#e9eaef; --muted:#8b909e; --faint:#5b606d;
    --miss:#e0a458; --got:#5fb89a; --review:#e0a458;
    --action:#7c83ff; --line:#2a2e3a;
    --ci:#7c83ff; --ma:#5fb89a; --cg:#e0a458; --cs:#d97a8a;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--ink);color:var(--text);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;min-height:100%}
  body{padding-bottom:env(safe-area-inset-bottom)}
  #root{max-width:680px;margin:0 auto;padding:18px 16px 40px;min-height:100vh;
    display:flex;flex-direction:column}

  .rail{height:4px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:16px}
  .rail-fill{height:100%;background:linear-gradient(90deg,var(--action),var(--got));
    width:0;transition:width .35s ease}

  header{display:flex;align-items:center;justify-content:space-between;
    gap:12px;margin-bottom:12px;flex-wrap:wrap}
  .header-right{display:inline-flex;align-items:center;gap:10px}
  h1{font-size:15px;font-weight:650;letter-spacing:-.01em}
  h1 span{color:var(--muted);font-weight:450}
  .counter{font-family:var(--mono);font-size:12px;color:var(--muted)}

  /* deck row */
  .deck-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;margin-bottom:14px}
  .deck-select{appearance:none;-webkit-appearance:none;background:var(--surface-2);
    color:var(--text);border:1px solid var(--line);border-radius:12px;
    padding:12px 36px 12px 14px;font:550 14px/1 var(--sans);cursor:pointer;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238b909e' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
    background-repeat:no-repeat;background-position:right 12px center;min-height:44px;width:100%}
  .deck-select:focus{outline:2px solid var(--action);outline-offset:2px}
  .add-btn{font:550 14px/1 var(--sans);background:var(--surface-2);color:var(--text);
    border:1px solid var(--line);border-radius:12px;padding:12px 16px;cursor:pointer;
    min-height:44px;display:flex;align-items:center;gap:6px;transition:.15s;white-space:nowrap}
  .add-btn:hover{border-color:var(--action);color:#fff}
  .add-btn.primary{background:var(--action);border-color:var(--action);color:#fff}
  .add-btn.primary:hover{filter:brightness(1.1)}
  .add-btn .plus{font-size:18px;line-height:0;font-weight:600}

  /* filters */
  .filters{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap}
  .chip{font-family:var(--mono);font-size:11.5px;letter-spacing:.02em;
    padding:8px 12px;border-radius:99px;border:1px solid var(--line);
    background:transparent;color:var(--muted);cursor:pointer;transition:.15s;
    min-height:32px}
  .chip:hover{border-color:var(--faint);color:var(--text)}
  .chip.on{background:var(--surface-2);border-color:var(--action);color:var(--text)}
  .chip .n{color:var(--faint);margin-left:5px}
  .chip.on .n{color:var(--action)}

  /* card */
  .stage{flex:1;display:flex;align-items:center;perspective:1600px;
    min-height:340px;margin-bottom:18px}
  .card{position:relative;width:100%;min-height:320px;cursor:pointer;
    transform-style:preserve-3d;transition:transform .45s cubic-bezier(.2,.7,.2,1)}
  .card.flipped{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;
    -webkit-backface-visibility:hidden;border-radius:16px;background:var(--surface);
    border:1px solid var(--line);padding:24px 22px;display:flex;flex-direction:column;
    overflow:hidden}
  .face.back{transform:rotateY(180deg);background:var(--surface-2)}
  .stripe{position:absolute;left:0;top:0;bottom:0;width:4px}

  .tags{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .scn{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.04em;
    text-transform:uppercase;padding:3px 8px;border-radius:6px;color:var(--ink)}
  .topic{font-family:var(--mono);font-size:11.5px;color:var(--muted)}
  .miss-flag{margin-left:auto;font-family:var(--mono);font-size:10.5px;
    color:var(--miss);border:1px solid var(--miss);border-radius:99px;
    padding:2px 8px;letter-spacing:.03em}

  .q-label,.a-label{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--faint);margin-bottom:9px}
  .q{font-size:18px;line-height:1.45;font-weight:500;letter-spacing:-.01em}
  .a{font-size:16.5px;line-height:1.5;font-weight:550;margin-bottom:12px;
    color:#fff;letter-spacing:-.005em}
  .why{font-size:14px;line-height:1.55;color:var(--muted)}
  .a code,.q code,.why code{font-family:var(--mono);font-size:.88em;
    background:#0e1014;padding:1px 5px;border-radius:5px;color:#c7cad6}
  .picked{margin-top:auto;padding-top:14px;font-family:var(--mono);font-size:12px;
    color:var(--miss)}
  .picked b{color:#fff;font-weight:600}
  .flip-hint{margin-top:auto;padding-top:14px;font-family:var(--mono);font-size:11px;
    color:var(--faint)}
  .card-tools{position:absolute;right:14px;top:14px;display:flex;gap:6px}
  .card-tool{background:rgba(0,0,0,.25);border:1px solid var(--line);color:var(--muted);
    font:550 11px/1 var(--mono);padding:6px 10px;border-radius:8px;cursor:pointer;
    min-height:30px}
  .card-tool:hover{color:var(--text);border-color:var(--faint)}
  .card-tool.danger:hover{color:var(--cs);border-color:var(--cs)}

  /* controls */
  .controls{display:grid;grid-template-columns:auto 1fr 1fr auto;gap:9px}
  .btn{font-family:var(--sans);font-size:14px;font-weight:550;border-radius:12px;
    border:1px solid var(--line);background:var(--surface);color:var(--text);
    padding:14px 14px;cursor:pointer;transition:.15s;display:flex;align-items:center;
    justify-content:center;gap:7px;min-height:48px}
  .btn:hover{border-color:var(--faint)}
  .btn:active{transform:translateY(1px)}
  .btn.nav{padding:14px 18px;color:var(--muted);font-family:var(--mono);font-size:16px}
  .btn.review{border-color:transparent;background:rgba(224,164,88,.12);color:var(--miss)}
  .btn.review:hover{background:rgba(224,164,88,.2)}
  .btn.got{border-color:transparent;background:rgba(95,184,154,.13);color:var(--got)}
  .btn.got:hover{background:rgba(95,184,154,.22)}
  .btn.on-review{background:var(--miss);color:var(--ink)}
  .btn.on-got{background:var(--got);color:var(--ink)}
  .btn:disabled{opacity:.35;cursor:default}

  .keys{text-align:center;font-family:var(--mono);font-size:10.5px;color:var(--faint);
    margin-top:14px;letter-spacing:.02em}
  .empty{text-align:center;color:var(--muted);font-size:15px;padding:48px 20px;line-height:1.6;
    border:1px dashed var(--line);border-radius:16px;margin-bottom:18px}
  .empty b{color:var(--got)}
  .empty .empty-cta{margin-top:18px;display:inline-flex}
  .reset{margin-top:18px;font-family:var(--mono);font-size:11px;color:var(--faint);
    background:none;border:none;cursor:pointer;text-decoration:underline;text-align:center;
    align-self:center;padding:8px}
  .reset:hover{color:var(--muted)}
  .deck-meta{margin-top:8px;font-family:var(--mono);font-size:11px;color:var(--faint);text-align:center}
  .deck-meta button{background:none;border:none;color:var(--cs);font:inherit;
    cursor:pointer;text-decoration:underline;padding:4px}
  .deck-meta .share{color:var(--action)}
  .share-banner{margin:14px 0 0;padding:11px 14px;border-radius:12px;
    background:rgba(124,131,255,.08);border:1px solid rgba(124,131,255,.3);
    font-size:12.5px;line-height:1.5;color:var(--text)}
  .share-banner b{color:var(--action)}
  .lib-btn{position:relative;background:var(--surface-2);border:1px solid var(--line);
    color:var(--muted);border-radius:10px;padding:8px 10px;cursor:pointer;min-height:34px;
    font:600 12.5px var(--sans);display:inline-flex;align-items:center;gap:6px;transition:.15s}
  .lib-btn:hover{color:var(--text);border-color:var(--faint)}
  .lib-btn .arrow{font-size:14px;line-height:1}
  .lib-btn .dot{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;
    border-radius:99px;background:var(--got);color:var(--ink);font:700 11px var(--sans);
    display:none;align-items:center;justify-content:center;padding:0 5px;
    box-shadow:0 0 0 2px var(--ink)}
  .lib-btn.has-new{border-color:var(--got);color:var(--got)}
  .lib-btn.has-new .dot{display:inline-flex;animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

  /* modal */
  .backdrop{position:fixed;inset:0;background:rgba(8,9,12,.72);backdrop-filter:blur(3px);
    z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0;
    animation:fade .15s ease}
  .sheet{background:var(--surface);width:100%;max-width:560px;
    border-radius:20px 20px 0 0;padding:22px 20px calc(28px + env(safe-area-inset-bottom));
    max-height:92vh;overflow-y:auto;border:1px solid var(--line);border-bottom:none;
    animation:slideup .25s cubic-bezier(.2,.7,.2,1)}
  .sheet h2{font-size:17px;font-weight:650;margin-bottom:4px;letter-spacing:-.01em}
  .sheet .sub{color:var(--muted);font-size:13px;margin-bottom:18px}
  .field{margin-top:14px}
  .field label{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--faint);margin-bottom:7px}
  .field input,.field textarea,.field select{
    width:100%;background:var(--ink);border:1px solid var(--line);color:var(--text);
    font:450 15px/1.4 var(--sans);padding:13px 14px;border-radius:11px;min-height:48px;
    transition:border-color .15s}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--action)}
  .field textarea{resize:vertical;min-height:96px;line-height:1.5}
  .field select{appearance:none;-webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238b909e' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
    background-repeat:no-repeat;background-position:right 14px center;padding-right:40px}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .checkrow{display:flex;align-items:center;gap:10px;margin-top:18px;
    background:var(--surface-2);padding:12px 14px;border-radius:11px;cursor:pointer;
    border:1px solid var(--line);min-height:48px}
  .checkrow input{width:18px;height:18px;accent-color:var(--miss)}
  .checkrow span{font-size:14px}
  .swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
  .swatch{width:38px;height:38px;border-radius:10px;border:2px solid transparent;
    cursor:pointer;transition:.12s}
  .swatch.on{border-color:#fff;transform:scale(1.08)}
  .actions{display:grid;grid-template-columns:1fr 1.4fr;gap:10px;margin-top:24px}
  .actions .btn{padding:15px;font-size:15px;min-height:52px}
  .btn-cancel{background:transparent;color:var(--muted)}
  .btn-save{background:var(--got);color:var(--ink);border-color:transparent;font-weight:650}
  .btn-save:hover{filter:brightness(1.06)}
  .btn-save:disabled{background:var(--line);color:var(--faint)}
  .inline-link{background:none;border:none;color:var(--action);font:550 12px var(--mono);
    cursor:pointer;padding:6px 0;text-decoration:underline;margin-top:6px}
  .subject-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
  .sub-chip{position:relative;display:inline-flex;align-items:center;gap:6px;
    background:var(--surface-2);border:2px solid transparent;color:var(--text);
    font:600 12.5px var(--sans);padding:8px 12px;border-radius:99px;cursor:pointer;
    min-height:36px;letter-spacing:.01em;transition:.12s}
  .sub-chip.colored{color:var(--ink)}
  .sub-chip.on{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.08)}
  .sub-chip:disabled{opacity:.6;cursor:not-allowed}
  .sub-chip.add-chip{background:transparent;border:1px dashed var(--line);color:var(--muted);
    font-family:var(--mono);font-size:11.5px;font-weight:550}
  .sub-chip.add-chip:hover{border-color:var(--action);color:var(--action)}
  .sub-chip.add-chip.on{border-color:var(--action);color:var(--action);background:rgba(124,131,255,.08)}
  .sub-x{background:rgba(0,0,0,.4);border:none;color:#fff;width:20px;height:20px;
    border-radius:50%;font:600 13px/1 var(--sans);cursor:pointer;display:inline-flex;
    align-items:center;justify-content:center;padding:0}
  .sub-x:hover{background:rgba(0,0,0,.6)}
  .sub-x:disabled{background:rgba(0,0,0,.15);cursor:not-allowed;color:rgba(255,255,255,.4)}
  .subject-editor{margin-top:14px;padding:14px;border-radius:12px;background:var(--ink);
    border:1px solid var(--action)}
  .subject-editor .field{margin-top:10px}
  .subject-editor .field:first-child{margin-top:0}
  .editor-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
  .editor-actions .btn{padding:11px;min-height:42px;font-size:13.5px}
  .subject-list{display:flex;flex-direction:column;gap:6px;margin-top:6px}
  .subject-row{display:flex;align-items:center;gap:10px;padding:6px 0;
    border-bottom:1px solid var(--line)}
  .subject-row:last-child{border-bottom:none}
  .subject-row .sub-chip{flex:0 0 auto}
  .subject-count{flex:1;font-size:12px;color:var(--muted);font-family:var(--mono);
    letter-spacing:.02em}
  .subject-row .sub-x{flex:0 0 auto;width:30px;height:30px;font-size:16px}
  .danger-zone{margin-top:22px;padding-top:18px;border-top:1px dashed var(--line)}
  .danger-zone .btn-danger{background:rgba(217,122,138,.12);color:var(--cs);border-color:transparent;
    width:100%;padding:14px;font-size:14px;min-height:48px}
  .danger-zone .btn-danger:hover{background:rgba(217,122,138,.22)}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes slideup{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}

  @media (min-width:560px){
    .backdrop{align-items:center;padding:24px}
    .sheet{border-radius:20px;border:1px solid var(--line);max-height:88vh}
  }
  @media (max-width:480px){
    #root{padding:14px 12px 32px}
    .q{font-size:16.5px}.a{font-size:15.5px}
    .controls{grid-template-columns:1fr 1fr}
    .btn.nav{order:3;font-size:18px;padding:14px}
    .deck-row{grid-template-columns:1fr 1fr}
    .deck-select{grid-column:1 / -1}
    .add-btn{justify-content:center}
    .field-row{grid-template-columns:1fr}
    .actions{grid-template-columns:1fr}
    .actions .btn-cancel{order:2}
  }
  @media (prefers-reduced-motion:reduce){
    .card{transition:none}.rail-fill{transition:none}
    .backdrop,.sheet{animation:none}
  }
</style>

<script>
const ORIGINAL_CARDS=[
{id:'ci1',scn:'CI',topic:'Batch Processing',miss:true,pick:'D',q:'Reduce API cost: you have latency-sensitive pre-merge checks AND overnight tech-debt reports. How do you split them?',a:'Batch for the overnight reports only; keep real-time for pre-merge checks.',why:'Match each API to its latency need — the Batches API (up to 24hr) suits reports, not blocking checks devs are waiting on.'},
{id:'ci2',scn:'CI',topic:'Batch Processing',miss:false,q:'Of your CI review modes, which is the best candidate to move to the Batches API?',a:'Deep analysis only.',why:'It already runs overnight, tolerates latency, and polls for completion — a perfect match for the async, poll-based batch model (50% savings).'},
{id:'ci3',scn:'CI',topic:'Structured Output',miss:false,q:'CI runs the Claude Code CLI in --print mode; you need reliable structured findings posted as inline PR comments.',a:'Use <code>--output-format json</code> + <code>--json-schema</code>, then parse and post via the GitHub API.',why:'Native CLI enforcement guarantees well-formed JSON with the required fields — more reliable than prompt-only formatting.'},
{id:'ci4',scn:'CI',topic:'Batch Processing',miss:true,pick:'A',q:'Three tasks: PR style checks, weekly security audits, nightly test generation. Which go to the Batches API?',a:'Sync for PR style checks; Batches API for the weekly audits + nightly tests.',why:'PR checks block developers (need immediate sync); audits and nightly tests are scheduled and tolerate the 24hr window. Not all three on batch.'},
{id:'ci5',scn:'CI',topic:'Task Decomposition',miss:true,pick:'C',q:'A PR touches 14 files; a single review pass gives uneven attention. How do you get consistent depth + catch cross-file issues?',a:'Split into focused per-file passes for local issues + one separate integration pass for cross-file data flow.',why:'Addresses the root cause (attention dilution). Consensus voting across 3 full runs suppresses real bugs that only appear intermittently.'},
{id:'ci6',scn:'CI',topic:'False Positive Reduction',miss:true,pick:'D',q:'~15 findings/PR; devs spend too long investigating each. Stakeholders rejected filtering. What helps?',a:'Require Claude to include reasoning + confidence inline with each finding.',why:'Faster triage, nothing hidden. Auto-suppressing FP-signature findings is still filtering — which was explicitly rejected.'},
{id:'ci7',scn:'CI',topic:'Few-Shot Prompting',miss:false,q:'Reviews find valid issues but the output format is inconsistent. Most reliable fix?',a:'Add 3-4 few-shot examples showing the exact format (issue, location, specific fix).',why:'Concrete format examples beat abstract instructions for consistency.'},
{id:'ci8',scn:'CI',topic:'False Positive Reduction',miss:true,pick:'A',q:'~50% FP rate is eroding dev trust NOW. Improving prompts will take weeks. What do you do in the meantime?',a:'Temporarily disable the high-FP categories (style, naming, docs); run only high-precision ones while you fix prompts.',why:'Stops trust erosion immediately. Keeping everything on for weeks lets devs keep dismissing all findings.'},
{id:'ci9',scn:'CI',topic:'CI/CD Integration',miss:true,pick:'D',q:'Your pipeline runs <code>claude "Analyze..."</code> and the job hangs waiting for input. Fix?',a:'Add the <code>-p</code> (<code>--print</code>) flag.',why:'Runs non-interactively, outputs to stdout, exits. <code>CLAUDE_HEADLESS=true</code> is not a real feature.'},
{id:'ci10',scn:'CI',topic:'Batch Processing',miss:true,pick:'D',q:'Your review works iteratively (analyze file → call tool → continue). Why can\'t the Batches API run this?',a:'The async fire-and-forget model can\'t execute a tool mid-request and return results for Claude to continue.',why:'It breaks iterative tool-calling. The limitation is architectural — not just the 24hr latency.'},
{id:'ci11',scn:'CI',topic:'Context',miss:false,q:'Your review suggests test cases but duplicates existing coverage. Fix?',a:'Include the existing test file in context so Claude sees what\'s already covered.',why:'Gives Claude the information to avoid redundant suggestions.'},
{id:'ci12',scn:'CI',topic:'Classification Consistency',miss:false,q:'Severity ratings are inconsistent for similar issues. How do you stabilize them?',a:'Put explicit severity criteria in the prompt with concrete code examples for each level.',why:'Removes ambiguity about what each level means; gives clear reference points.'},
{id:'ci13',scn:'CI',topic:'Prompt Specificity',miss:true,pick:'C',q:'Review flags comments/docstrings unreliably. The instruction is vague. Best fix that generalizes?',a:'Specify the explicit criterion: flag a comment only when its claimed behavior contradicts the actual code.',why:'Defining the criterion beats few-shot examples, which won\'t generalize to novel contradiction types.'},
{id:'ci14',scn:'CI',topic:'CI/CD Integration',miss:true,pick:'D',q:'After a re-push, the review re-reports issues already fixed. Stop redundant comments?',a:'Include prior review findings in context; instruct Claude to report only new/still-unaddressed issues.',why:'A post-processing match-filter is brittle — LLM comment wording varies across runs.'},
{id:'ci15',scn:'CI',topic:'Multi-Instance Verification',miss:true,pick:'C',q:'Claude generated code, considered the edge cases, concluded it was correct — but it\'s wrong. More thinking didn\'t help. What does?',a:'Have a second, independent Claude review the changes without seeing the generator\'s reasoning.',why:'Eliminates confirmation bias — a fresh perspective, like human peer review. More deliberation can\'t un-rationalize a decision already made.'},

{id:'ma1',scn:'MA',topic:'Orchestration',miss:false,q:'Research output missed whole domains (music, writing, film); the subagents all executed their tasks fine. Root cause?',a:'The coordinator\'s task decomposition was too narrow.',why:'It only assigned visual-arts subtasks. The decomposition — not the subagents — caused the missing coverage.'},
{id:'ma2',scn:'MA',topic:'Error Propagation',miss:true,pick:'A',q:'Web search returns results for only 3 of 5 source categories. How should synthesis handle it?',a:'Structure the synthesis output with coverage annotations: which findings are well-supported vs which areas have gaps.',why:'Graceful degradation with transparency. Erroring out throws away all the work that did succeed.'},
{id:'ma3',scn:'MA',topic:'Tool Distribution',miss:true,pick:'A',q:'The doc-analysis agent has a general <code>fetch_url</code> tool and keeps doing web searches with it. Fix?',a:'Replace <code>fetch_url</code> with a scoped <code>load_document</code> tool that validates URLs point to document formats.',why:'Constrain capability at the interface (least privilege) so the wrong behavior is impossible — don\'t remove the legit ability.'},
{id:'ma4',scn:'MA',topic:'Orchestration',miss:false,q:'Web search + doc analysis both finished. What happens next in the orchestrator-workers pattern?',a:'The coordinator passes both sets of findings to the synthesis agent for unified integration.',why:'The coordinator maintains centralized control: collect from subagents, route to the next component.'},
{id:'ma5',scn:'MA',topic:'Error Propagation',miss:false,q:'Doc-analysis subagent hits a corrupted PDF it can\'t parse. Best response?',a:'Return the error with context to the coordinator and let it decide.',why:'Keeps the failure visible; the coordinator has the context to skip, retry differently, or notify the user.'},
{id:'ma6',scn:'MA',topic:'Orchestration',miss:false,q:'Combined upstream output is 85K tokens of verbose content, blowing up synthesis cost. Fix at the source?',a:'Modify upstream agents to return structured data (key facts, citations, relevance scores) instead of verbose content.',why:'Cuts token volume where it\'s generated, preserving the essential info for synthesis.'},
{id:'ma7',scn:'MA',topic:'Tool Distribution',miss:true,pick:'A',q:'Synthesis agent constantly round-trips to web search for simple fact checks (85% are simple). Reduce latency how?',a:'Give synthesis a scoped <code>verify_fact</code> tool for simple lookups; keep delegating the 15% complex ones via the coordinator.',why:'Handles most lookups directly (least privilege) while preserving the delegation path for hard cases.'},
{id:'ma8',scn:'MA',topic:'Error Propagation',miss:true,pick:'D',q:'Doc-analysis subagent frequently hits transient PDF failures. How should it handle errors?',a:'Implement local recovery for transient failures; only propagate the truly unresolvable ones — with what was attempted + partial results.',why:'Handle errors at the lowest capable level. Masking errors as success hides real data-quality problems.'},
{id:'ma9',scn:'MA',topic:'Orchestration',miss:false,q:'Why route all subagent communication through the coordinator (hub-and-spoke) vs agent-to-agent?',a:'The coordinator can observe all interactions, handle errors consistently, and control what info each subagent receives.',why:'These are the core advantages of centralized hub-and-spoke communication.'},
{id:'ma10',scn:'MA',topic:'Error Propagation',miss:false,q:'Web search subagent times out on a complex topic. What should it return?',a:'Structured error context: failure type, attempted query, partial results, and potential alternative approaches.',why:'Gives the coordinator everything it needs to make an intelligent recovery decision.'},
{id:'ma11',scn:'MA',topic:'Tool Distribution',miss:true,pick:'D',q:'Coordinator mis-routes requests — the web-search and doc-analysis tools have semantically overlapping descriptions. Fix?',a:'Rename the web search tool (e.g. <code>extract_web_results</code>) and update its description so each tool\'s purpose is unambiguous.',why:'Fixes the root cause (semantic overlap). Few-shot routing examples just patch the symptom.'},
{id:'ma12',scn:'MA',topic:'Error Propagation',miss:true,pick:'B',q:'Web search: one source times out, another returns "0 results." Treat them the same?',a:'No — distinguish access failures (timeout → retry) from valid empty results ("0 results" = a successful query).',why:'They\'re semantically distinct outcomes needing different responses. Retrying a definitively-empty source wastes resources.'},
{id:'ma13',scn:'MA',topic:'Orchestration',miss:true,pick:'C',q:'Doc-analysis agent finds two credible sources with directly conflicting figures. What should it do?',a:'Complete the analysis with both figures included, annotate the conflict with source attribution, and let the coordinator reconcile.',why:'Picking a winner oversteps its role — it lacks the broader context. Don\'t bury a real discrepancy in a footnote.'},
{id:'ma14',scn:'MA',topic:'Long Context Position',miss:true,pick:'D',q:'Synthesis quality is inconsistent; key info gets lost in large aggregated input (lost-in-the-middle). Fix?',a:'Put a key-findings summary at the start (primacy) and add explicit section headers to aid navigation.',why:'Leverages the primacy effect and helps the model attend to middle content. Aggressive summarizing risks worse info loss.'},

{id:'cg1',scn:'CG',topic:'Path-Specific Rules',miss:true,pick:'D',q:'Different conventions for React components vs API routes vs tests, applied automatically by file path. What mechanism?',a:'Rule files in <code>.claude/rules/</code> with YAML frontmatter + glob patterns (e.g. <code>**/*.test.tsx</code>).',why:'Globs apply conventions deterministically by path. Skills need manual invocation — wrong fit for automatic, path-based rules.'},
{id:'cg2',scn:'CG',topic:'Plan Mode',miss:false,q:'You\'re restructuring a monolith into microservices across dozens of files. Best first move?',a:'Enter plan mode — explore the codebase, understand dependencies, design the approach before changing anything.',why:'Safe exploration + informed decisions about service boundaries before costly changes.'},
{id:'cg3',scn:'CG',topic:'Slash Commands',miss:true,pick:'B',q:'You want a custom <code>/review</code> slash command, version-controlled for the whole team. Where does it go?',a:'In the <code>.claude/commands/</code> directory in the project repo.',why:'Version-controlled and auto-available to everyone who clones. CLAUDE.md is for instructions/context, not command definitions.'},
{id:'cg4',scn:'CG',topic:'CLAUDE.md Hierarchy',miss:false,q:'A guideline works for original devs but new hires don\'t get it. Likely cause + fix?',a:'It lives in the original devs\' user-level <code>~/.claude/CLAUDE.md</code> — move it to the project\'s <code>.claude/CLAUDE.md</code>.',why:'Project-level config reaches all current and future team members automatically.'},
{id:'cg5',scn:'CG',topic:'MCP Integration',miss:true,pick:'C',q:'Add a GitHub MCP server for the team, with auth, without committing secrets. How?',a:'Add it to a project-scoped <code>.mcp.json</code> using env var expansion (<code>${GITHUB_TOKEN}</code>); document the var in the README.',why:'One version-controlled source of truth; each dev supplies their own credential. A custom token-proxy wrapper is over-engineered.'},
{id:'cg6',scn:'CG',topic:'Context Isolation',miss:true,pick:'B',q:'An <code>/analyze-codebase</code> skill produces huge output that pollutes the main context. Fix?',a:'Add <code>context: fork</code> to the skill\'s frontmatter — runs it in an isolated sub-agent context.',why:'Verbose output stays out of the main session. Splitting into 3 skills produces the same total output.'},
{id:'cg7',scn:'CG',topic:'Slash Commands',miss:false,q:'A <code>/migration</code> skill needs: show expected params, isolate execution, restrict to file-write only. Which 3 features?',a:'<code>argument-hint</code> + <code>context: fork</code> + <code>allowed-tools</code> (restricted to file writes).',why:'Each maps to one requirement: param hints on autocomplete, isolated execution, and locked-down tool access.'},
{id:'cg8',scn:'CG',topic:'Slash Commands',miss:true,pick:'C',q:'2-3 exemplar endpoint implementations help generation, but you don\'t want them loaded during unrelated tasks. How?',a:'Create a skill referencing the exemplars + pattern-following instructions, invoked on-demand via slash command.',why:'Loads the context only when generating endpoints — not during bug fixes or reviews. Manual copy-paste is tedious and error-prone.'},
{id:'cg9',scn:'CG',topic:'Context Isolation',miss:true,pick:'C',q:'An <code>/explore-alternatives</code> skill\'s brainstorming leaks into later implementation work. Fix?',a:'Add <code>context: fork</code> to the skill\'s frontmatter so it runs isolated.',why:'Keeps abandoned approaches out of the main history. Moving it to <code>~/.claude/skills/</code> only changes discoverability, not isolation.'},
{id:'cg10',scn:'CG',topic:'Modular Org',miss:false,q:'CLAUDE.md is 500+ lines mixing TS conventions, testing, API rules. How to organize?',a:'Split into separate topic files in <code>.claude/rules/</code> (e.g. <code>testing.md</code>, <code>api-conventions.md</code>).',why:'Organizes large instruction sets into focused, maintainable modules.'},
{id:'cg11',scn:'CG',topic:'Plan Mode',miss:false,q:'Adding Slack notifications — multiple valid approaches (webhooks/bot tokens/Slack Apps), requirements ambiguous. First move?',a:'Enter plan mode to explore the options + trade-offs, then present a recommendation before implementing.',why:'Multiple valid architectures + ambiguity = explore and align before committing to a path.'},
{id:'cg12',scn:'CG',topic:'Slash Commands',miss:false,q:'You want a personal version of the team\'s project <code>/commit</code> skill. What\'s the catch?',a:'Project skills take precedence over personal skills of the same name — give yours a different name (e.g. <code>/my-commit</code>).',why:'A different name in <code>~/.claude/skills/</code> keeps your version accessible alongside the team\'s.'},
{id:'cg13',scn:'CG',topic:'Skills vs CLAUDE.md',miss:false,q:'400+ line CLAUDE.md mixing universal standards with task-specific workflows. How to split?',a:'Keep universal standards in CLAUDE.md (always loaded); move task workflows into Skills with trigger keywords.',why:'CLAUDE.md loads every conversation (always-on); Skills invoke on-demand when Claude detects relevant keywords.'},
{id:'cg14',scn:'CG',topic:'Subagent Delegation',miss:true,pick:'C',q:'Adding error handling across 120 files: Phase 1 discovery is verbose, Phases 2-3 need retained context. How?',a:'Use the Explore subagent for Phase 1 to isolate the verbose output and return a summary; continue Phases 2-3 in the main conversation.',why:'Preserves the main context window for the design and implementation phases where retained context matters most.'},
{id:'cg15',scn:'CG',topic:'Iterative Refinement',miss:true,pick:'C',q:'Claude keeps misunderstanding a data transformation\'s field nesting + timestamp format. Best fix?',a:'Provide 2-3 concrete input→output examples showing the expected transformation.',why:'Eliminates prose ambiguity by showing exactly what\'s expected. A JSON schema only verifies structure — it doesn\'t teach the logic.'},

{id:'cs1',scn:'CS',topic:'Escalation Decisions',miss:false,q:'Agent hits 55% first-contact resolution (target 80%); logs show unclear escalate-vs-resolve boundaries. First fix?',a:'Add explicit escalation criteria to the system prompt with few-shot examples of when to escalate vs resolve.',why:'Addresses the root cause (unclear decision boundaries) — proportionate, no new infrastructure.'},
{id:'cs2',scn:'CS',topic:'Parallel Tool Execution',miss:true,pick:'B',q:'Agent averages 4+ API round-trips per resolution (sequential tool calls). Minimal-change fix?',a:'Prompt Claude to batch related tool requests in a single turn and return all results together before the next API call.',why:'Leverages Claude\'s native multi-tool ability with minimal change. Composite tools add maintenance burden for every combination.'},
{id:'cs3',scn:'CS',topic:'Workflow Orchestration',miss:false,q:'A multi-concern request causes redundant data fetching + many tool calls. Best approach?',a:'Decompose into distinct concerns, investigate each in parallel using shared customer context, then synthesize.',why:'Reuses context across concerns (no redundant fetches) and parallelizes the investigations.'},
{id:'cs4',scn:'CS',topic:'Self-Evaluation',miss:false,q:'The agent\'s explanations for complex cases are inconsistently complete. Fix without human review?',a:'Add a self-critique step (evaluator-optimizer): evaluate the draft for completeness before sending.',why:'Catches case-specific gaps (policy context, timelines, next steps) that vary across scenarios — no human in the loop.'},
{id:'cs5',scn:'CS',topic:'Context Management',miss:false,q:'Progressive summarization at 70% context loses precise details (amounts, dates, order #s). Fix?',a:'Extract transactional facts into a persistent "case facts" block included in every prompt, outside the summarized history.',why:'Summarization is lossy for precise details; a structured facts block keeps them reliably available regardless of turn count.'},
{id:'cs6',scn:'CS',topic:'Tool Interface Design',miss:true,pick:'B',q:'Agent calls <code>get_customer</code> for order questions — picks the wrong tool. Low-effort, high-leverage first step?',a:'Expand each tool\'s description: input formats, example queries, edge cases, and boundaries (when to use it vs similar tools).',why:'Descriptions are the LLM\'s primary tool-selection input. A keyword routing layer is over-engineered and brittle.'},
{id:'cs7',scn:'CS',topic:'Tool Selection',miss:true,pick:'C',q:'Agent frequently picks <code>get_customer</code> for order lookups. First diagnostic step?',a:'Review the tool descriptions to ensure they clearly distinguish each tool\'s purpose.',why:'Descriptions guide selection — check them before building a separate router/classifier that bypasses native selection.'},
{id:'cs8',scn:'CS',topic:'Tool Selection',miss:true,pick:'D',q:'Single-concern requests: 94% accuracy. Multi-concern messages fail. Fix?',a:'Add few-shot examples demonstrating correct reasoning + tool sequence for multi-concern requests.',why:'It already handles single concerns well — it just needs the multi-concern pattern. A separate decompose model-call is over-engineered.'},
{id:'cs9',scn:'CS',topic:'Tool Selection',miss:true,pick:'B',q:'When users say "account," correct tool selection drops to 78% (vs 93% without the word). Tool descriptions are clean. Root cause?',a:'The system prompt contains keyword-sensitive instructions steering behavior on terms like "account."',why:'The systematic keyword-triggered pattern points to prompt-level routing logic, not a training-data gap. Fine-tuning is disproportionate.'},
{id:'cs10',scn:'CS',topic:'Escalation Decisions',miss:false,q:'Customer wants a competitor price match; policy covers own-site drops within 14 days but is silent on competitors. Agent should?',a:'Escalate for policy interpretation.',why:'A genuine policy gap — the agent can\'t fabricate policy and needs human judgment to interpret/extend the rules.'},
{id:'cs11',scn:'CS',topic:'Ambiguous Result Handling',miss:false,q:'<code>get_customer</code> returns multiple matches when searching by name (15% wrong-customer rate). Fix?',a:'Instruct Claude to ask for an additional identifier (email, phone, order #) when there are multiple matches, before acting.',why:'The user has definitive knowledge of their own identity — one extra turn eliminates the wrong-customer error rate.'},
{id:'cs12',scn:'CS',topic:'Agentic Loop',miss:false,q:'Implementing the agentic loop — how do you know when to continue vs stop after each API call?',a:'Check the <code>stop_reason</code> field: continue on <code>"tool_use"</code>, stop on <code>"end_turn"</code>.',why:'It\'s Claude\'s explicit, structured loop-control signal: tool_use = run a tool and return results; end_turn = response complete.'},
{id:'cs13',scn:'CS',topic:'Tool Selection',miss:true,pick:'D',q:'Agent sometimes picks <code>get_customer</code> when <code>lookup_order</code> is right, on ambiguous requests. How to structure few-shot examples?',a:'Add 4-6 examples targeting the ambiguous scenarios, each showing reasoning for why one tool was chosen over a plausible alternative.',why:'Teaches comparative decision-making by contrasting tools. Grouping examples by tool teaches each in isolation — not the needed contrast.'}
];

const ORIGINAL_SCN={
  CI:{label:'Claude Code · CI',color:'#7c83ff'},
  MA:{label:'Multi-Agent',color:'#5fb89a'},
  CG:{label:'Code Generation',color:'#e0a458'},
  CS:{label:'Customer Support',color:'#d97a8a'}
};

const BUILTIN_DECKS=[{
  id:'cca-f',
  name:'CCA-F Drill Deck',
  builtin:true,
  scenarios:ORIGINAL_SCN,
  cards:ORIGINAL_CARDS
}];

const PRESET_COLORS=['#7c83ff','#5fb89a','#e0a458','#d97a8a','#9d7cff','#5fb5e0','#e07a5f','#a8b85f'];

const STORE_KEY='drill-decks-v2';
const LEGACY_KEY='cca-f-progress-v1';
const REPO='liitx/claude-cert-practice-exam-cards';
const SHARED_URL='./decks.json';

let state={currentDeckId:'cca-f',userDecks:[],overlay:{cards:{},scenarios:{}},progress:{}};
let filter='miss';
let idx=0;
let flipped=false;
let modal=null;
let pendingSync=null;

function load(){
  try{
    const v=localStorage.getItem(STORE_KEY);
    if(v){
      const parsed=JSON.parse(v);
      state={...state,...parsed};
      state.overlay=state.overlay||{cards:{},scenarios:{}};
      state.overlay.cards=state.overlay.cards||{};
      state.overlay.scenarios=state.overlay.scenarios||{};
      state.progress=state.progress||{};
      state.userDecks=state.userDecks||[];
      if(parsed.view){
        if(typeof parsed.view.filter==='string')filter=parsed.view.filter;
        if(Number.isInteger(parsed.view.idx))idx=parsed.view.idx;
      }
    }else{
      const legacy=localStorage.getItem(LEGACY_KEY);
      if(legacy){
        try{state.progress={'cca-f':JSON.parse(legacy)};}catch(e){}
      }
    }
  }catch(e){}
  if(!getDeckBase(state.currentDeckId))state.currentDeckId='cca-f';
  render();
  loadSharedDecks();
}

async function loadSharedDecks(){
  try{
    const res=await fetch(SHARED_URL,{cache:'no-cache'});
    if(!res.ok)return;
    const data=await res.json();
    if(!data||!Array.isArray(data.decks))return;
    BUILTIN_DECKS.length=0;
    data.decks.forEach(d=>BUILTIN_DECKS.push({...d,builtin:true,shared:true}));
    if(!getDeckBase(state.currentDeckId))state.currentDeckId=BUILTIN_DECKS[0]?.id||'cca-f';
    pendingSync=null;
    render();
  }catch(e){/* offline — keep embedded fallback */}
}

async function checkLibrary(){
  try{
    const res=await fetch(SHARED_URL,{cache:'no-cache'});
    if(!res.ok)return;
    const data=await res.json();
    if(!data||!Array.isArray(data.decks))return;
    let newDecks=0,newCards=0;
    for(const d of data.decks){
      const cur=BUILTIN_DECKS.find(x=>x.id===d.id);
      if(!cur){newDecks++;newCards+=Array.isArray(d.cards)?d.cards.length:0;continue;}
      const curIds=new Set(cur.cards.map(c=>c.id));
      newCards+=d.cards.filter(c=>!curIds.has(c.id)).length;
    }
    if(newDecks>0||newCards>0){
      pendingSync={data,newDecks,newCards};
      render();
    }else if(pendingSync){
      pendingSync=null;
      render();
    }
  }catch(e){}
}

function applySync(){
  if(!pendingSync)return;
  BUILTIN_DECKS.length=0;
  pendingSync.data.decks.forEach(d=>BUILTIN_DECKS.push({...d,builtin:true,shared:true}));
  pendingSync=null;
  render();
}
async function syncNow(){
  await checkLibrary();
  if(pendingSync)applySync();
}

function save(){try{
  const out={...state,view:{filter,idx}};
  localStorage.setItem(STORE_KEY,JSON.stringify(out));
}catch(e){}}

function getDeckBase(id){
  return state.userDecks.find(d=>d.id===id)||BUILTIN_DECKS.find(d=>d.id===id)||null;
}
function deckScenarios(id){
  const base=getDeckBase(id);if(!base)return {};
  return {...base.scenarios,...((state.overlay.scenarios||{})[id]||{})};
}
function deckCards(id){
  const base=getDeckBase(id);if(!base)return [];
  return [...base.cards,...((state.overlay.cards||{})[id]||[])];
}
function isUserCard(deckId,cardId){
  return ((state.overlay.cards||{})[deckId]||[]).some(c=>c.id===cardId);
}
function currentDeck(){return getDeckBase(state.currentDeckId);}
function deckProgress(){
  if(!state.progress[state.currentDeckId])state.progress[state.currentDeckId]={};
  return state.progress[state.currentDeckId];
}

function viewDeck(){
  const cards=deckCards(state.currentDeckId);
  const st=deckProgress();
  if(filter==='all')return cards;
  if(filter==='miss')return cards.filter(c=>c.miss);
  if(filter==='review')return cards.filter(c=>st[c.id]==='review');
  if(filter==='got')return cards.filter(c=>st[c.id]==='got');
  return cards;
}
function counts(){
  const cards=deckCards(state.currentDeckId);
  const st=deckProgress();
  return {
    all:cards.length,
    miss:cards.filter(c=>c.miss).length,
    review:cards.filter(c=>st[c.id]==='review').length,
    got:cards.filter(c=>st[c.id]==='got').length
  };
}

function setFilter(f){filter=f;idx=0;flipped=false;save();render();}
function go(d){const dk=viewDeck();if(!dk.length)return;idx=(idx+d+dk.length)%dk.length;flipped=false;save();render();}
function flip(){flipped=!flipped;render();}
function mark(s){
  const dk=viewDeck();if(!dk.length)return;
  const c=dk[idx];const st=deckProgress();
  if(st[c.id]===s)delete st[c.id]; else st[c.id]=s;
  save();
  const nd=viewDeck();if(idx>=nd.length)idx=Math.max(0,nd.length-1);
  render();
}
function resetAll(){
  if(!confirm('Reset all progress for "'+currentDeck().name+'"?'))return;
  state.progress[state.currentDeckId]={};
  save();idx=0;flipped=false;render();
}
function switchDeck(id){
  state.currentDeckId=id;
  idx=0;flipped=false;filter='all';
  save();
  render();
}

function deleteCard(deckId,cardId){
  if(!confirm('Delete this card?'))return;
  const list=(state.overlay.cards||{})[deckId]||[];
  state.overlay.cards[deckId]=list.filter(c=>c.id!==cardId);
  const pg=state.progress[deckId]||{};delete pg[cardId];
  save();
  const nd=viewDeck();if(idx>=nd.length)idx=Math.max(0,nd.length-1);
  flipped=false;render();
}
function deleteDeck(){
  const d=currentDeck();if(!d||d.builtin)return;
  if(!confirm('Delete deck "'+d.name+'" and all its cards?'))return;
  state.userDecks=state.userDecks.filter(x=>x.id!==d.id);
  delete state.progress[d.id];
  if(state.overlay.cards)delete state.overlay.cards[d.id];
  if(state.overlay.scenarios)delete state.overlay.scenarios[d.id];
  state.currentDeckId='cca-f';
  save();idx=0;flipped=false;filter='all';render();
}

/* -------- modals -------- */

function openCardModal(){
  const scenarios=deckScenarios(state.currentDeckId);
  const keys=Object.keys(scenarios);
  modal={type:'card',subject:keys[0]||'',topic:'',q:'',a:'',why:'',missed:false,pick:'',
    newSubject:keys.length?null:{label:'',color:PRESET_COLORS[0]}};
  render();
}
function openDeckModal(){
  modal={type:'deck',name:'',firstLabel:'',firstColor:PRESET_COLORS[0]};
  render();
}
function closeModal(){modal=null;render();}
function mset(k,v){modal[k]=v;refreshUI();}
function msetR(k,v){modal[k]=v;render();}
function mnest(p,k,v){modal[p]=modal[p]||{};modal[p][k]=v;refreshUI();}
function refreshUI(){refreshSaveBtn();refreshSubjectEditorBtn();}
function refreshSaveBtn(){
  if(!modal)return;
  const btn=document.querySelector('.btn-save');
  if(!btn)return;
  let valid=false;
  if(modal.type==='card'){
    const subjectOK=modal.newSubject?!!modal.newSubject.label.trim():!!modal.subject;
    valid=!!(modal.q.trim()&&modal.a.trim()&&subjectOK);
  }else if(modal.type==='deck'){
    valid=!!(modal.name.trim()&&modal.firstLabel.trim());
  }else if(modal.type==='import'){
    valid=!!(modal.text&&modal.text.trim());
  }
  btn.disabled=!valid;
}
function refreshSubjectEditorBtn(){
  if(!modal)return;
  const edit=document.querySelector('.sub-edit-save');
  if(edit)edit.disabled=!(modal.editLabel&&modal.editLabel.trim());
  const add=document.querySelector('.sub-new-save');
  if(add)add.disabled=!(modal.newSubject&&modal.newSubject.label.trim());
}

function pickSubject(key){
  modal.subject=key;
  modal.newSubject=null;
  modal.editingSubjectKey=null;
  render();
}
function toggleSubjectEdit(){
  modal.editingSubjects=!modal.editingSubjects;
  modal.editingSubjectKey=null;
  render();
}
function openSubjectEditor(key){
  const scenarios=deckScenarios(state.currentDeckId);
  const s=scenarios[key];if(!s)return;
  modal.editingSubjectKey=key;
  modal.editLabel=s.label;
  modal.editColor=s.color;
  modal.newSubject=null;
  render();
}
function closeSubjectEditor(){modal.editingSubjectKey=null;render();}
function pickEditColor(c){modal.editColor=c;render();}
function saveSubjectEdit(){
  const key=modal.editingSubjectKey;
  if(!key||!modal.editLabel.trim())return;
  const deckId=state.currentDeckId;
  const entry={label:modal.editLabel.trim(),color:modal.editColor};
  const userDeck=state.userDecks.find(d=>d.id===deckId);
  if(userDeck&&userDeck.scenarios[key]){
    userDeck.scenarios[key]=entry;
  }else{
    state.overlay.scenarios[deckId]=state.overlay.scenarios[deckId]||{};
    state.overlay.scenarios[deckId][key]=entry;
  }
  save();
  modal.editingSubjectKey=null;
  render();
}
function removeSubject(key){
  const deckId=state.currentDeckId;
  const using=deckCards(deckId).filter(c=>c.scn===key).length;
  if(using>0){alert(using+' card'+(using>1?'s':'')+' use this subject. Move or delete '+(using>1?'them':'it')+' first.');return;}
  if(Object.keys(deckScenarios(deckId)).length<=1){alert('Keep at least one subject in the deck.');return;}
  if(!confirm('Delete this subject?'))return;
  const userDeck=state.userDecks.find(d=>d.id===deckId);
  if(userDeck&&userDeck.scenarios[key])delete userDeck.scenarios[key];
  if((state.overlay.scenarios[deckId]||{})[key])delete state.overlay.scenarios[deckId][key];
  if(modal.subject===key)modal.subject=Object.keys(deckScenarios(deckId))[0]||'';
  if(modal.editingSubjectKey===key)modal.editingSubjectKey=null;
  save();render();
}
function isUserSubject(deckId,key){
  const userDeck=state.userDecks.find(d=>d.id===deckId);
  if(userDeck&&userDeck.scenarios[key])return true;
  if((state.overlay.scenarios[deckId]||{})[key])return true;
  return false;
}

/* -------- export / import -------- */

function buildExportThisDeck(){
  const deckId=state.currentDeckId;
  const userDeck=state.userDecks.find(d=>d.id===deckId);
  const progress=state.progress[deckId]||{};
  if(userDeck){
    return {version:1,kind:'deck',deck:JSON.parse(JSON.stringify(userDeck)),progress};
  }
  return {
    version:1,kind:'overlay',targetDeckId:deckId,
    cards:JSON.parse(JSON.stringify((state.overlay.cards||{})[deckId]||[])),
    scenarios:JSON.parse(JSON.stringify((state.overlay.scenarios||{})[deckId]||{})),
    progress
  };
}
function buildExportEverything(){
  return {
    version:1,kind:'all',
    userDecks:JSON.parse(JSON.stringify(state.userDecks)),
    overlay:JSON.parse(JSON.stringify(state.overlay)),
    progress:JSON.parse(JSON.stringify(state.progress)),
    exportedAt:new Date().toISOString()
  };
}
function copyExport(scope){
  const data=scope==='all'?buildExportEverything():buildExportThisDeck();
  const text=JSON.stringify(data,null,2);
  const done=ok=>{
    const note=document.getElementById('export-note');
    if(note)note.textContent=ok?'Copied to clipboard.':'Copy failed — use Download instead.';
  };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>done(true),()=>done(false));
  }else done(false);
}
function downloadExport(scope){
  const data=scope==='all'?buildExportEverything():buildExportThisDeck();
  const text=JSON.stringify(data,null,2);
  const blob=new Blob([text],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const stamp=new Date().toISOString().slice(0,10);
  const baseName=scope==='all'?'drill-all':(data.kind==='deck'?(data.deck.name||'deck'):('overlay-'+data.targetDeckId));
  a.href=url;
  a.download=baseName.replace(/[^a-z0-9-]+/gi,'-').replace(/^-+|-+$/g,'').toLowerCase()+'-'+stamp+'.json';
  document.body.appendChild(a);a.click();a.remove();
  URL.revokeObjectURL(url);
}

function saveNewSubject(){
  if(!modal||!modal.newSubject||!modal.newSubject.label.trim())return;
  const deckId=state.currentDeckId;
  const label=modal.newSubject.label.trim();
  const existing=deckScenarios(deckId);
  let base=label.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4)||'S';
  let key=base;let n=2;
  while(existing[key])key=base+(n++);
  const entry={label,color:modal.newSubject.color};
  const userDeck=state.userDecks.find(d=>d.id===deckId);
  if(userDeck){userDeck.scenarios[key]=entry;}
  else{state.overlay.scenarios[deckId]=state.overlay.scenarios[deckId]||{};state.overlay.scenarios[deckId][key]=entry;}
  save();
  modal.newSubject=null;
  render();
}
function doImport(){
  if(!modal.text.trim()){modal.error='Paste JSON first.';render();return;}
  let data;
  try{data=JSON.parse(modal.text);}
  catch(e){modal.error='Could not parse JSON: '+e.message;render();return;}
  if(!data||typeof data!=='object'){modal.error='JSON must be an object.';render();return;}
  if(!data.kind){modal.error='Missing "kind" field. Use JSON exported from this app.';render();return;}
  try{
    if(data.kind==='all'){
      const existingIds=new Set(state.userDecks.map(d=>d.id));
      (data.userDecks||[]).forEach(d=>{
        let id=d.id||('imported-'+Math.random().toString(36).slice(2,7));
        while(existingIds.has(id))id=id+'-'+Math.random().toString(36).slice(2,5);
        existingIds.add(id);
        state.userDecks.push({...d,id});
      });
      if(data.overlay&&typeof data.overlay==='object'){
        for(const[deckId,arr]of Object.entries(data.overlay.cards||{})){
          state.overlay.cards[deckId]=[...(state.overlay.cards[deckId]||[]),...(Array.isArray(arr)?arr:[])];
        }
        for(const[deckId,obj]of Object.entries(data.overlay.scenarios||{})){
          state.overlay.scenarios[deckId]={...(state.overlay.scenarios[deckId]||{}),...(obj||{})};
        }
      }
      if(data.progress&&typeof data.progress==='object'){
        for(const[deckId,prog]of Object.entries(data.progress)){
          state.progress[deckId]={...(state.progress[deckId]||{}),...(prog||{})};
        }
      }
    }else if(data.kind==='deck'){
      if(!data.deck||typeof data.deck!=='object')throw new Error('deck object missing');
      const existingIds=new Set(state.userDecks.map(d=>d.id));
      let id=data.deck.id||('imported-'+Math.random().toString(36).slice(2,7));
      while(existingIds.has(id))id=id+'-'+Math.random().toString(36).slice(2,5);
      state.userDecks.push({...data.deck,id});
      if(data.progress)state.progress[id]={...(state.progress[id]||{}),...data.progress};
    }else if(data.kind==='overlay'){
      const targetId=data.targetDeckId;
      if(!targetId)throw new Error('targetDeckId missing');
      state.overlay.cards[targetId]=[...(state.overlay.cards[targetId]||[]),...(Array.isArray(data.cards)?data.cards:[])];
      state.overlay.scenarios[targetId]={...(state.overlay.scenarios[targetId]||{}),...(data.scenarios||{})};
      if(data.progress)state.progress[targetId]={...(state.progress[targetId]||{}),...data.progress};
    }else{
      throw new Error('Unknown kind: '+data.kind);
    }
  }catch(e){modal.error='Import failed: '+e.message;render();return;}
  save();
  modal=null;
  filter='all';
  render();
}

function deckHasUserContent(deckId){
  if(state.userDecks.some(d=>d.id===deckId))return true;
  const addedCards=(state.overlay.cards||{})[deckId]||[];
  const addedScn=(state.overlay.scenarios||{})[deckId]||{};
  return addedCards.length>0||Object.keys(addedScn).length>0;
}

function shareDeck(){
  const d=currentDeck();if(!d)return;
  const deckId=state.currentDeckId;
  const userDeck=state.userDecks.find(x=>x.id===deckId);
  let payload,title;
  if(userDeck){
    payload={type:'new-deck',deck:{
      name:userDeck.name,
      scenarios:deckScenarios(deckId),
      cards:deckCards(deckId)
    }};
    title='Deck submission: '+userDeck.name;
  }else{
    const cards=(state.overlay.cards||{})[deckId]||[];
    const scenarios=(state.overlay.scenarios||{})[deckId]||{};
    if(!cards.length&&!Object.keys(scenarios).length){
      alert('No cards or subjects you\'ve added to this deck yet. Add some first.');
      return;
    }
    payload={type:'cards-for-deck',targetDeckId:deckId,cards,scenarios};
    title='Cards for '+d.name+': '+cards.length+' new';
  }
  const json=JSON.stringify(payload,null,2);
  const body='<!-- Submission via the app. Maintainer: review and merge into decks.json. -->\n\n```json\n'+json+'\n```';
  const base='https://github.com/'+REPO+'/issues/new?labels=submission&title='+encodeURIComponent(title);
  const full=base+'&body='+encodeURIComponent(body);
  if(full.length>7500){
    const fallback=()=>{
      alert('Deck is large. The JSON has been copied to your clipboard — paste it into the new issue that opens.');
      window.open(base,'_blank','noopener');
    };
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(body).then(fallback,fallback);
    }else fallback();
  }else{
    window.open(full,'_blank','noopener');
  }
}

function saveCard(){
  const deckId=state.currentDeckId;
  let subjectKey=modal.subject;
  if(modal.newSubject&&modal.newSubject.label.trim()){
    const label=modal.newSubject.label.trim();
    const existing=deckScenarios(deckId);
    let base=label.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4)||'S';
    let key=base;let n=2;
    while(existing[key])key=base+n++;
    state.overlay.scenarios[deckId]=state.overlay.scenarios[deckId]||{};
    state.overlay.scenarios[deckId][key]={label,color:modal.newSubject.color};
    subjectKey=key;
  }
  if(!modal.q.trim()||!modal.a.trim()||!subjectKey)return;
  const card={
    id:'u'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    scn:subjectKey,
    topic:modal.topic.trim()||'General',
    q:modal.q.trim(),
    a:modal.a.trim(),
    why:modal.why.trim(),
    miss:!!modal.missed,
    user:true
  };
  if(modal.missed&&modal.pick.trim())card.pick=modal.pick.trim();
  state.overlay.cards[deckId]=state.overlay.cards[deckId]||[];
  state.overlay.cards[deckId].push(card);
  save();
  modal=null;
  filter='all';
  const dk=viewDeck();idx=dk.findIndex(c=>c.id===card.id);if(idx<0)idx=dk.length-1;
  flipped=false;render();
}

function saveDeck(){
  if(!modal.name.trim()||!modal.firstLabel.trim())return;
  const id='d'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const label=modal.firstLabel.trim();
  const key=label.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4)||'S1';
  state.userDecks.push({
    id,
    name:modal.name.trim(),
    scenarios:{[key]:{label,color:modal.firstColor}},
    cards:[]
  });
  state.currentDeckId=id;
  state.progress[id]={};
  save();
  modal=null;
  idx=0;flipped=false;filter='all';
  render();
}

    ['review','Review',c.review],
    ['got','Got it',c.got]
  ].map(([k,lbl,n])=>`<button class="chip ${filter===k?'on':''}" onclick="setFilter('${k}')">${lbl}<span class="n">${n}</span></button>`).join('');

  let body;
  if(!dk.length){
    const msg=filter==='review'?'Nothing in your review pile.<br>Mark cards <b>Review</b> as you study to build one.'
      :filter==='got'?'No cards marked <b>Got it</b> yet.'
      :filter==='miss'?'No cards flagged as missed.'
      :'This deck has no cards yet.';
    body=`<div class="empty">${msg}
      <div class="empty-cta"><button class="add-btn primary" onclick="openCardModal()"><span class="plus">+</span> New card</button></div>
    </div>`;
  }else{
    const card=dk[idx];const s=scenarios[card.scn]||{label:card.scn,color:'#7c83ff'};const stCard=st[card.id];
    const userCard=isUserCard(state.currentDeckId,card.id);
    const allowHTML=!card.user;
    body=`
    <div class="stage">
      <div class="card ${flipped?'flipped':''}" onclick="flip()">
        <div class="face front">
          <div class="stripe" style="background:${s.color}"></div>
          ${userCard?`<div class="card-tools"><button class="card-tool danger" onclick="event.stopPropagation();deleteCard('${state.currentDeckId}','${card.id}')">delete</button></div>`:''}
          <div class="tags">
            <span class="scn" style="background:${s.color}">${esc(s.label)}</span>
            <span class="topic">${esc(card.topic)}</span>
            ${card.miss?'<span class="miss-flag">you missed this</span>':''}
          </div>
          <div class="q-label">Situation</div>
          <div class="q">${txt(card.q,allowHTML)}</div>
          <div class="flip-hint">tap or press space to reveal →</div>
        </div>
        <div class="face back">
          <div class="stripe" style="background:${s.color}"></div>
          <div class="tags">
            <span class="scn" style="background:${s.color}">${esc(s.label)}</span>
            <span class="topic">${esc(card.topic)}</span>
          </div>
          <div class="a-label">Correct approach</div>
          <div class="a">${txt(card.a,allowHTML)}</div>
          ${card.why?`<div class="why">${txt(card.why,allowHTML)}</div>`:''}
          ${card.miss&&card.pick?`<div class="picked">you picked <b>${esc(card.pick)}</b> — retrain the reflex above</div>`:''}
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="btn nav" onclick="go(-1)" aria-label="Previous">←</button>
      <button class="btn review ${stCard==='review'?'on-review':''}" onclick="mark('review')">⟲ Review</button>
      <button class="btn got ${stCard==='got'?'on-got':''}" onclick="mark('got')">✓ Got it</button>
      <button class="btn nav" onclick="go(1)" aria-label="Next">→</button>
    </div>
    <div class="keys">space flip · ← → move · 1 review · 2 got it</div>`;
  }

  const newCount=pendingSync?(pendingSync.newDecks+pendingSync.newCards):0;
  const libTitle=pendingSync
    ?`${pendingSync.newDecks?pendingSync.newDecks+' new deck'+(pendingSync.newDecks>1?'s':''):''}${pendingSync.newDecks&&pendingSync.newCards?', ':''}${pendingSync.newCards?pendingSync.newCards+' new card'+(pendingSync.newCards>1?'s':''):''} — tap to sync`
    :'Library up to date — tap to check';

  root.innerHTML=`
    <div class="rail"><div class="rail-fill" style="width:${pct}%"></div></div>
    <header>
      <h1>${esc(d.name)} <span>· ${reviewed}/${totalCards} touched · ${pct}% mastered</span></h1>
      <span class="header-right">
        <button class="lib-btn ${pendingSync?'has-new':''}" onclick="syncNow()" title="${esc(libTitle)}" aria-label="${esc(libTitle)}">
          <span class="arrow">&#x21bb;</span>
          <span>library</span>
          ${newCount?`<span class="dot">${newCount>9?'9+':newCount}</span>`:'<span class="dot"></span>'}
        </button>
        <span class="counter">${dk.length?`${idx+1} / ${dk.length}`:'0 / 0'}</span>
      </span>
    </header>
    <div class="deck-row">
      <select class="deck-select" onchange="switchDeck(this.value)" aria-label="Select deck">${deckOpts}</select>
      <button class="add-btn primary" onclick="openCardModal()" aria-label="New card"><span class="plus">+</span> Card</button>
      <button class="add-btn" onclick="openDeckModal()" aria-label="New deck"><span class="plus">+</span> Deck</button>
    </div>
    <div class="filters">${chips}</div>
    ${body}
    <div class="deck-meta">
      <button class="reset" onclick="resetAll()">reset progress</button>
      · <button class="reset" onclick="openManageSubjectsModal()">subjects</button>
      ${deckHasUserContent(state.currentDeckId)?` · <button class="reset share" onclick="shareDeck()">share to library</button>`:''}
      · <button class="reset" onclick="openExportModal()">export</button>
      · <button class="reset" onclick="openImportModal()">import</button>
      ${!d.builtin?` · <button onclick="deleteDeck()">delete this deck</button>`:''}
    </div>
    ${modalHTML()}`;
}

document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible')checkLibrary();
});
window.addEventListener('focus',()=>checkLibrary());

document.addEventListener('keydown',e=>{
  if(modal){
    if(e.key==='Escape')closeModal();
    return;
  }
  if(e.target&&(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT'))return;
  if(e.key===' '){e.preventDefault();flip();}
  else if(e.key==='ArrowRight')go(1);
  else if(e.key==='ArrowLeft')go(-1);
  else if(e.key==='1')mark('review');
  else if(e.key==='2')mark('got');
});

load();
</script>
</body>
</html>
